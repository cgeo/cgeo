name: Build Foss Debug APK

on:
  push:
  pull_request:

jobs:
  build-foss-debug:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build assembleFossDebug
        run: ./gradlew assembleFossDebug

      - name: Upload Foss Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: cgeo-foss-debug-apk
          path: main/build/outputs/apk/foss/debug/cgeo*.apk
